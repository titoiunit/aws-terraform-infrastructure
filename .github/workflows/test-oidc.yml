name: Test AWS OIDC Role

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  test-oidc:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show GitHub context basics
        run: |
          echo "github.repository=${{ github.repository }}"
          echo "github.ref=${{ github.ref }}"
          echo "github.ref_name=${{ github.ref_name }}"
          echo "github.event_name=${{ github.event_name }}"

      - name: Debug GitHub OIDC claims
        uses: github/actions-oidc-debugger@main
        with:
          audience: sts.amazonaws.com

      - name: Configure AWS credentials from GitHub OIDC
        uses: aws-actions/configure-aws-credentials@v6.0.0
        with:
          aws-region: eu-west-1
          role-to-assume: arn:aws:iam::428516841589:role/github-oidc-aws-terraform-infrastructure-role
          role-session-name: github-oidc-test

      - name: Verify who AWS thinks I am
        run: aws sts get-caller-identity

      - name: Verify EC2 read permission
        run: aws ec2 describe-regions --region eu-west-1 --output table
