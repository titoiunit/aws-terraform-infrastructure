name: test-aws-oidc

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  test-oidc:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Configure AWS credentials from GitHub OIDC
        uses: aws-actions/configure-aws-credentials@v6.0.0
        with:
          aws-region: eu-west-1
          role-to-assume: arn:aws:iam::428516841589:role/gha-oidc-aws-terraform-infrastructure-main
          role-session-name: ${{ github.run_id }}
          allowed-account-ids: 428516841589

      - name: Verify assumed identity
        run: aws sts get-caller-identity
